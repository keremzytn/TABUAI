<div class="admin-container">
    <div class="admin-header">
        <h1>Kullanıcı Yönetimi</h1>
        <button class="btn-refresh" (click)="loadUsers()" [disabled]="isLoading">
            <i class="fas" [class.fa-sync-alt]="!isLoading" [class.fa-spinner]="isLoading"
                [class.fa-spin]="isLoading"></i> Yenile
        </button>
    </div>

    <div class="table-container shadow-premium" [class.loading]="isLoading">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Kullanıcı Adı</th>
                    <th>E-posta</th>
                    <th>Seviye</th>
                    <th>Toplam Puan</th>
                    <th>Rol</th>
                    <th>Durum</th>
                    <th>Kayıt Tarihi</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users">
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td><span class="badge-level">{{ user.level }}</span></td>
                    <td>{{ user.totalScore }}</td>
                    <td><span class="badge-role" [class.admin]="user.role === 'Admin'">{{ user.role }}</span></td>
                    <td>
                        <span class="badge-status" [class.active]="user.isActive" [class.inactive]="!user.isActive">
                            {{ user.isActive ? 'Aktif' : 'Pasif' }}
                        </span>
                    </td>
                    <td>{{ user.createdAt | date:'shortDate' }}</td>
                    <td>
                        <button class="btn-action" [class.btn-danger]="user.isActive && user.role !== 'Admin'"
                            (click)="toggleStatus(user.id)" [disabled]="user.role === 'Admin'">
                            {{ user.role === 'Admin' ? 'Erişilemez' : (user.isActive ? 'Pasife Al' : 'Aktif Et') }}
                        </button>
                    </td>
                </tr>
                <tr *ngIf="users.length === 0 && !isLoading">
                    <td colspan="7" class="empty-state">Kullanıcı bulunamadı.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
