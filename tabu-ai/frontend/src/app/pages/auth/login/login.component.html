<div class="login-container">
    <div class="card glass-panel">
        <div class="card-header">
            <h2>Giriş Yap</h2>
            <p class="subtitle">TabuAI dünyasına hoşgeldin!</p>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" name="username" [(ngModel)]="loginData.username" required
                    class="form-control glass-input" placeholder="Kullanıcı adınız">
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" [(ngModel)]="loginData.password" required
                    class="form-control glass-input" placeholder="Şifreniz">
            </div>

            <div *ngIf="error" class="error-message">
                {{ error }}
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
                <span *ngIf="!isLoading">Giriş Yap</span>
                <span *ngIf="isLoading" class="spinner"></span>
            </button>
        </form>

        <div class="card-footer">
            <p>Hesabın yok mu? <a routerLink="/register">Kayıt Ol</a></p>
        </div>
    </div>
</div>
