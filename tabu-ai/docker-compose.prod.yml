version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tabuai-backend
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - ConnectionStrings__DefaultConnection=Host=localhost;Database=tabuai_db;Username=tabuai_user;Password=tabuai_password
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tabuai-frontend
    network_mode: host
    environment:
      - API_URL=http://localhost:5000/api
    restart: always
